<!doctype html>
<html lang="nl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tournament Scheduler</title>
  <meta name="description" content="Static GitHub Pages tournament scheduler built with PyScript." />
  <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
  <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js">
  </script>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="container">
    <header class="hero">
      <div>
        <p class="eyebrow">Thijs Vollebregt 2026</p>
        <h1>Bob &amp; Bert schema planner 2000</h1>
        <p class="lead">
          Das lekker. Hoeven Chris en Nanette het niet meer te doen
        </p>
      </div>

      <div class="header-controls">
        <div id="status" class="status status-info">Ready.</div>

        <div class="header-actions">
          <div class="action-group">
            <button id="generate-btn" type="button">Schema genereren</button>
          </div>

          <div class="action-group">
            <input id="teams-csv-file" type="file" accept=".csv,text/csv" hidden />
            <button id="teams-csv-trigger" type="button" class="button button-secondary">
              Teams uploaden
            </button>
            <span id="teams-csv-feedback" class="muted small"></span>
          </div>

          <div class="action-group">
            <input id="prefs-csv-file" type="file" accept=".csv,text/csv" hidden />
            <button id="prefs-csv-trigger" type="button" class="button button-secondary">
              Voorkeuren uploaden
            </button>
            <span id="prefs-csv-feedback" class="muted small"></span>
          </div>
        </div>
      </div>
    </header>



    <section class="grid">
      <section class="panel">
        <h2>Wedstrijd opties</h2>

        <div class="field-row params">
          <label>
            <span>Rondes</span>
            <input id="n-rondes" type="number" min="1" value="7" />
          </label>
          <label>
            <span>Aantal velden</span>
            <input id="n-velden" type="number" min="1" max="12" value="8" />
          </label>
        </div>

        <!-- === Teams beheren (inline add/remove) === -->
        <section class="field-block">
          <h2>Teams beheren</h2>

          <div class="field-row"
            style="display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)) auto; gap: 12px; align-items: end;">
            <label>
              <span>Naam</span>
              <input id="new-team-name" type="text" placeholder="Teamname" />
            </label>

            <label>
              <span>Geslacht</span>
              <select id="new-team-gender">
                <option value="Mixed">Mixed</option>
                <option value="Heren">Heren</option>
                <option value="Dames">Dames</option>
              </select>
            </label>

            <label>
              <span>Leeftijd</span>
              <select id="new-team-age">
                <option value="Jong">Jong</option>
                <option value="Oud">Oud</option>
              </select>
            </label>

            <label>
              <span>Niveau</span>
              <input id="new-team-level" type="number" min="1" max="3" value="1" />
            </label>

            <label>
              <span>Wedstrijden</span>
              <input id="new-team-matches" type="number" min="1" max="3" value="1" />
            </label>

            <button id="add-team-btn" type="button" class="secondary">Team toevoegen</button>
          </div>




          <!-- Live list of current teams -->
          <div id="teams-list" class="summary-card" style="margin-top: 12px;"></div>
        </section>
        <!-- === /Teams beheren === -->

        <label class="field-block">
          <textarea id="teams-json" spellcheck="false" hidden></textarea>
        </label>


        <section class="field-block">
          <h2>Voorkeur wedstrijden</h2>
          <div class="pref-row">
            <label class="pref-select-wrap">
              <span>Team A</span>
              <select id="pref-team-a"></select>
            </label>
            <label class="pref-select-wrap">
              <span>Team B</span>
              <select id="pref-team-b"></select>
            </label>
            <button id="add-pref-btn" type="button" class="secondary pref-add-btn">
              Voorkeur toevoegen
            </button>
          </div>
          <div id="prefs-editor-empty" class="muted small" style="margin-top: 8px;">
          </div>
          <div id="prefs-list" style="display: grid; gap: 8px; margin-top: 12px;"></div>
        </section>

        <label class="field-block">
          <textarea id="prefs-json" spellcheck="false" hidden></textarea>
        </label>
      </section>

      <section class="panel">
        <h2>Output</h2>

        <div class="output-toolbar">
          <div class="view-toggle" role="tablist" aria-label="Outputweergave">
            <button id="view-table-btn" type="button" class="secondary is-active">
              Wedstrijden
            </button>
            <button id="view-timeline-btn" type="button" class="secondary">
              Team timeline
            </button>
          </div>

          <button id="export-excel" class="secondary toolbar-export">
            ⬇ Exporteren als Excel
          </button>
        </div>



        <div id="summary" class="summary-card hidden"></div>
        <!-- kept for compatibility, but hidden because we now reuse #summary -->
        <div id="capacity-summary" class="summary-card hidden"></div>
        <div id="schedule-output"></div>
        <div id="timeline-output" class="hidden"></div>
        <div id="remaining-output"></div>

      </section>
    </section>
  </main>

  <script type="py" src="./app.py" config="./pyscript.toml"></script>

  <!-- Add this next to your main PyScript script tag -->
  <script
    type="py"
    src="./scheduler_worker.py"
    worker
    name="scheduler"
    config="./pyscript-worker.toml"
  ></script>


  <script>
    const teamsCsvFile = document.getElementById("teams-csv-file");
    const prefsCsvFile = document.getElementById("prefs-csv-file");

    const teamsCsvTrigger = document.getElementById("teams-csv-trigger");
    const prefsCsvTrigger = document.getElementById("prefs-csv-trigger");

    const primaryGenerateBtn = document.getElementById("generate-btn");
    const secondaryGenerateBtn = document.getElementById("generate-btn-secondary");

    if (teamsCsvTrigger && teamsCsvFile) {
      teamsCsvTrigger.addEventListener("click", () => {
        teamsCsvFile.value = "";
        teamsCsvFile.click();
      });
    }

    if (prefsCsvTrigger && prefsCsvFile) {
      prefsCsvTrigger.addEventListener("click", () => {
        prefsCsvFile.value = "";
        prefsCsvFile.click();
      });
    }

    if (secondaryGenerateBtn && primaryGenerateBtn) {
      secondaryGenerateBtn.addEventListener("click", () => {
        primaryGenerateBtn.click();
      });
    }
  </script>


</body>

</html>
